name: video_converter_pro
description: Un'applicazione professionale per conversione video, audio e immagini
homepage: https://github.com/sviluppoarte1-lang/Fe-Media-Converter

publish_to: 'none'

version: 2.0.2+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^6.1.1
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  process_run: ^0.13.3+1
  flutter_localizations:
    sdk: flutter
  intl: any
  path: ^1.9.0
  url_launcher: ^6.1.11
  desktop_drop: ^0.7.0
  flutter_super_resolution: ^1.0.5
  onnxruntime: ^1.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
